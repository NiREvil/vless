proxy-groups:
- name: 🔰 PROXIES
  type: select
  proxies:
  - 🇮🇷 AUTO-IR-ENTRY
  - 🇸🇪 AUTO-SW-DIALER
  - DIRECT
  - SW-DIALER-01
  - SW-DIALER-02
  - SW-DIALER-03
  - SW-DIALER-04
  - SW-DIALER-05
  - SW-DIALER-06
  - SW-DIALER-07
  - SW-DIALER-08
  - IR-ENTRY-01
  - IR-ENTRY-02
  - IR-ENTRY-03
  - IR-ENTRY-04
  - IR-ENTRY-05
  - IR-ENTRY-06
  - IR-ENTRY-07
  - IR-ENTRY-08
- name: 🇮🇷 AUTO-IR-ENTRY
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  timeout: 5000
  max-failed-times: 3
  proxies:
  - IR-ENTRY-01
  - IR-ENTRY-02
  - IR-ENTRY-03
  - IR-ENTRY-04
  - IR-ENTRY-05
  - IR-ENTRY-06
  - IR-ENTRY-07
  - IR-ENTRY-08
- name: 🇸🇪 AUTO-SW-DIALER
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  timeout: 5000
  max-failed-times: 3
  proxies:
  - SW-DIALER-01
  - SW-DIALER-02
  - SW-DIALER-03
  - SW-DIALER-04
  - SW-DIALER-05
  - SW-DIALER-06
  - SW-DIALER-07
  - SW-DIALER-08
rule-providers:
  phishing:
    type: http
    format: text
    behavior: domain
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/phishing.txt
    path: ./ruleset/phishing.txt
    interval: 86400
  malware:
    type: http
    format: text
    behavior: domain
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/malware.txt
    path: ./ruleset/malware.txt
    interval: 86400
  cryptominers:
    type: http
    format: text
    behavior: domain
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/cryptominers.txt
    path: ./ruleset/cryptominers.txt
    interval: 86400
  category-ads-all:
    type: http
    format: text
    behavior: domain
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/category-ads-all.txt
    path: ./ruleset/category-ads-all.txt
    interval: 86400
  private:
    type: http
    format: yaml
    behavior: domain
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml
    path: ./ruleset/private.yaml
    interval: 86400
  private-cidr:
    type: http
    format: yaml
    behavior: ipcidr
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.yaml
    path: ./ruleset/private-cidr.yaml
    interval: 86400
  ir:
    type: http
    format: text
    behavior: domain
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ir.txt
    path: ./ruleset/ir.txt
    interval: 86400
  ir-cidr:
    type: http
    format: text
    behavior: ipcidr
    url: https://raw.githubusercontent.com/Chocolate4U/Iran-clash-rules/release/ircidr.txt
    path: ./ruleset/ir-cidr.txt
    interval: 86400
rules:
- RULE-SET,phishing,REJECT
- RULE-SET,malware,REJECT
- RULE-SET,cryptominers,REJECT
- RULE-SET,category-ads-all,REJECT
- RULE-SET,private,DIRECT
- RULE-SET,private-cidr,DIRECT,no-resolve
- RULE-SET,ir,DIRECT
- RULE-SET,ir-cidr,DIRECT,no-resolve
- MATCH,🔰 PROXIES
ntp:
  enable: true
  server: time.apple.com
  port: 123
  interval: 30
