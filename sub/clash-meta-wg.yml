proxy-groups:
- name: 🔰 PROXIES
  type: select
  proxies:
  - 🇮🇷 AUTO-IR-ENTRY
  - 🇸🇪 AUTO-SW-DIALER
  - DIRECT
  - SW-DIALER-01
  - SW-DIALER-02
  - SW-DIALER-03
  - SW-DIALER-04
  - SW-DIALER-05
  - SW-DIALER-06
  - SW-DIALER-07
  - SW-DIALER-08
